<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recruiter Dashboard | Rise Career</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.section { display:none; }
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:rgb(199,193,181);
  padding:12px 18px;
  border-radius:8px;
  display:none;
  z-index:1000;
}
</style>
</head>

<body class="bg-[rgb(199,193,181)] font-sans">

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if (!token || role !== "recruiter") {
  alert("Access denied");
  window.location.href = "/html/index.html";
}
</script>

<!-- NAVBAR -->
<nav class="bg-black text-[rgb(199,193,181)] px-8 py-4 flex justify-between">
  <h1 class="text-xl font-bold">Rise Career</h1>
  <div class="space-x-6">
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-white shadow-lg border-r p-6 text-black min-h-screen p-6">
  <h2 class="font-bold text-xl mb-8">Recruiter Panel</h2>

  <div class="space-y-3">
    <button onclick="show('post')" class="block w-full text-left hover:text-white">📌 Post Job</button>
    <button onclick="show('jobs')" class="block w-full text-left hover:text-white">📄 My Jobs</button>
    <button onclick="show('applications')" class="block w-full text-left hover:text-white">👥 Applicants</button>
    <button onclick="show('profile')" class="block w-full text-left hover:text-white">👤 Profile</button>
  </div>
</aside>

<main class="flex-1 p-10">

<!-- DASHBOARD -->
<section id="dashboard" class="section block">
<h2 class="text-3xl font-bold mb-6">Welcome 👋</h2>
</section>

<!-- POST JOB -->
<section id="post" class="section">
<h2 class="text-2xl font-bold mb-6">Post Job</h2>

<div class="bg-white p-6 rounded-xl shadow space-y-4">
<input id="title" class="border p-2 w-full" placeholder="Job Title">
<input id="company" class="border p-2 w-full" placeholder="Company Name">
<input id="location" class="border p-2 w-full" placeholder="Location">
<textarea id="description" class="border p-2 w-full" placeholder="Description"></textarea>

<button onclick="postJob()" class="bg-black text-[rgb(199,193,181)] px-6 py-2 rounded">
Post Job
</button>
</div>
</section>

<!-- JOBS -->
<section id="jobs" class="section">
<h2 class="text-2xl font-bold mb-6">My Jobs</h2>
<div id="jobsList"></div>
</section>

<!-- APPLICATIONS -->
<section id="applications" class="section">
<h2 class="text-2xl font-bold mb-6">Applicants</h2>
<div id="applicationsList"></div>
</section>

<!-- PROFILE -->
<section id="profile" class="section max-w-5xl mx-auto">

<h2 class="text-3xl font-bold mb-8 text-gray-800">Recruiter Profile</h2>

<div class="bg-white shadow-2xl rounded-2xl p-8 space-y-8">

<!-- PROFILE HEADER -->
<div class="flex flex-col items-center space-y-4">
  <img id="preview"
    class="w-36 h-36 rounded-full object-cover border-4 border-black shadow-md"
    src="https://via.placeholder.com/150">

  <label class="cursor-pointer bg-black text-white px-5 py-2 rounded-lg hover:bg-gray-800 transition">
    Upload Photo
    <input type="file" id="photo" class="hidden">
  </label>
</div>

<!-- PERSONAL -->
<div>
<h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">Personal Details</h3>

<div class="grid md:grid-cols-2 gap-5">

<input id="recName" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Full Name">

<input id="recEmail" class="border p-3 rounded-lg bg-gray-100" readonly>

<input id="phone" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Phone">

<input id="city" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="City">

<input id="linkedin" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="LinkedIn URL">

<input id="website" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Website">

</div>
</div>

<!-- PROFESSIONAL -->
<div>
<h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">Professional Info</h3>

<div class="grid md:grid-cols-2 gap-5">

<input id="recCompany" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Company">

<input id="position" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Position">

<input id="industry" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Industry">

<input id="experience" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Years of Experience">

<input id="companySize" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Company Size">

<input id="companyType" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Company Type (Startup/MNC)">

</div>
</div>

<!-- ABOUT -->
<div>
<h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">About</h3>

<textarea id="bio"
  class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-black outline-none"
  placeholder="Write about yourself..."></textarea>

<textarea id="companyDesc"
  class="border p-3 w-full rounded-lg focus:ring-2 focus:ring-black outline-none mt-4"
  placeholder="About your company..."></textarea>
</div>

<!-- EDUCATION -->
<div>
<h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">Education</h3>

<div class="grid md:grid-cols-2 gap-5">
<input id="degree" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Degree">

<input id="college" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="College">
</div>
</div>

<!-- SKILLS / HOBBIES -->
<div class="grid md:grid-cols-2 gap-5">
<input id="skills" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Skills">

<input id="hobbies" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Hobbies">
</div>

<!-- JOB PREF -->
<div>
<h3 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2">Hiring Preferences</h3>

<div class="grid md:grid-cols-2 gap-5">
<input id="prefLocation" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Preferred Location">

<input id="jobType" class="border p-3 rounded-lg focus:ring-2 focus:ring-black outline-none" placeholder="Job Type">
</div>
</div>

<!-- BUTTON -->
<div class="text-center pt-4">
<button onclick="saveProfile()"
  class="bg-black text-white px-10 py-3 rounded-xl text-lg font-semibold hover:bg-gray-800 transition shadow-md">
  Save Profile
</button>
</div>

</div>
</section>

</main>
</div>

<div id="toast" class="toast"></div>

<script>
const API="http://localhost:5000/api";

/* TOAST */
function toast(msg){
  const toastEl=document.getElementById("toast");
  toastEl.innerText=msg;
  toastEl.style.display="block";
  setTimeout(()=>toastEl.style.display="none",2000);
}

/* SWITCH SECTIONS */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="jobs") loadJobs();
  if(id==="applications") loadApplications();
  if(id==="profile") loadProfile();}

/* POST JOB */
async function postJob() {
  const titleEl = document.getElementById("title");
  const companyEl = document.getElementById("company");
  const locationEl = document.getElementById("location");
  const descriptionEl = document.getElementById("description");

  if (!titleEl.value || !companyEl.value || !locationEl.value || !descriptionEl.value) {
    toast("Please fill all fields");
    return;
  }

  try {
    const res = await fetch(`${API}/jobs`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({
        title: titleEl.value,
        company: companyEl.value,
        location: locationEl.value,
        description: descriptionEl.value
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.msg || "Failed to post job");

    toast("✅ Job Posted Successfully");

    titleEl.value="";
    companyEl.value="";
    locationEl.value="";
    descriptionEl.value="";

    loadJobs();
    show("jobs");

  } catch(err){
    console.error(err);
    toast("❌ Something went wrong");
  }
}

/* LOAD JOBS */
async function loadJobs() {
  const res = await fetch(`${API}/jobs/my`, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  const jobsList = document.getElementById("jobsList");
  jobsList.innerHTML = "";

  data.jobs.forEach(j => {
    jobsList.innerHTML += `
      <div class="bg-white p-5 rounded shadow mb-4" data-id="${j._id}">
        <h3 class="font-bold">${j.title}</h3>
        <p>${j.company} • ${j.location}</p>
        <button onclick="deleteJob('${j._id}')" class="bg-red-500 text-white px-3 py-1 mt-3 rounded">
          Delete
        </button>
      </div>`;
  });
}

/* DELETE JOB */
async function deleteJob(jobId){
  if(!confirm("Are you sure you want to delete this job permanently?")) return;

  try{
    const res = await fetch(`${API}/jobs/${jobId}`, {
      method:"DELETE",
      headers:{Authorization:`Bearer ${token}`}
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.msg || "Delete failed");

    const jobCard=document.querySelector(`[data-id='${jobId}']`);
    if(jobCard) jobCard.remove();

    toast("✅ Job Deleted Successfully");

  }catch(err){
    console.error(err);
    toast("❌ Delete failed");
  }
}
async function loadApplications(){
  try{

    const res = await fetch(`${API}/jobs/applications`, {
      headers:{ Authorization:`Bearer ${token}` }
    });

    const data = await res.json();
    const list = document.getElementById("applicationsList");

    list.innerHTML = "";

    if(!data.applications || data.applications.length === 0){
      list.innerHTML = "<p>No applications yet</p>";
      return;
    }

    data.applications.forEach(app=>{

      list.innerHTML += `
      <div class="bg-white p-4 rounded shadow mb-3">

        <p><strong>${app.jobId?.title || "Job"}</strong></p>
        <p>👤 ${app.userId?.name || "Unknown User"}</p>
        <p>📧 ${app.userId?.email || "-"}</p>

        <p>Status: 
          <b class="${
            app.status === "accepted" ? "text-green-600" :
            app.status === "rejected" ? "text-red-500" :
            "text-yellow-600"
          }">
            ${app.status || "applied"}
          </b>
        </p>

        <div class="mt-2 space-x-2">

          ${
            app.status !== "accepted"
            ? `<button onclick="updateStatus('${app._id}','accepted')"
              class="bg-green-600 text-white px-3 py-1 rounded">
              Accept
              </button>`
            : ""
          }

          ${
            app.status !== "rejected"
            ? `<button onclick="updateStatus('${app._id}','rejected')"
              class="bg-red-500 text-white px-3 py-1 rounded">
              Reject
              </button>`
            : ""
          }

        </div>

      </div>
      `;
    });

  }catch(err){
    console.error("❌ loadApplications error:", err);
  }
}

async function updateStatus(appId, status){
  try{

    await fetch(`${API}/jobs/applications/${appId}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body: JSON.stringify({ status })
    });

    loadApplications(); // 🔥 refresh

  }catch(err){
    console.error(err);
  }
}
/* PHOTO UPLOAD */
document.getElementById("photo").onchange = function(){
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("preview").src = e.target.result;
    localStorage.setItem("recPhoto", e.target.result);
  };
  reader.readAsDataURL(this.files[0]);
};

/* SAVE PROFILE */
function saveProfile(){
  const p={
    name:recName.value,
    email:recEmail.value,
    phone:phone.value,
    city:city.value,

    company:recCompany.value,
    position:position.value,
    industry:industry.value,
    experience:experience.value,

    degree:degree.value,
    college:college.value,

    hobbies:hobbies.value,
    skills:skills.value,            // ✅ NEW

    prefLocation:prefLocation.value,
    jobType:jobType.value,

    linkedin:linkedin.value,        // ✅ NEW
    website:website.value,          // ✅ NEW

    companySize:companySize.value,  // ✅ NEW
    companyType:companyType.value,  // ✅ NEW

    bio:bio.value,                  // ✅ NEW
    companyDesc:companyDesc.value   // ✅ NEW
  };

  localStorage.setItem("recruiterProfile",JSON.stringify(p));
  toast("✅ Profile Saved");
}

/* LOAD PROFILE */
function loadProfile(){
  const p=JSON.parse(localStorage.getItem("recruiterProfile"))||{};
  recName.value=p.name||"";
  recEmail.value=localStorage.getItem("email")||"";
  phone.value=p.phone||"";
  city.value=p.city||"";
  recCompany.value=p.company||"";
  position.value=p.position||"";
  industry.value=p.industry||"";
  experience.value=p.experience||"";
  degree.value=p.degree||"";
  college.value=p.college||"";
  hobbies.value=p.hobbies||"";
  prefLocation.value=p.prefLocation||"";
  jobType.value=p.jobType||"";

  const img = localStorage.getItem("recPhoto");
  if(img) preview.src = img;
}function loadProfile(){
  const p=JSON.parse(localStorage.getItem("recruiterProfile"))||{};

  recName.value=p.name||"";
  recEmail.value=localStorage.getItem("email")||"";
  phone.value=p.phone||"";
  city.value=p.city||"";

  recCompany.value=p.company||"";
  position.value=p.position||"";
  industry.value=p.industry||"";
  experience.value=p.experience||"";

  degree.value=p.degree||"";
  college.value=p.college||"";

  hobbies.value=p.hobbies||"";
  skills.value=p.skills||"";              // ✅ NEW

  prefLocation.value=p.prefLocation||"";
  jobType.value=p.jobType||"";

  linkedin.value=p.linkedin||"";          // ✅ NEW
  website.value=p.website||"";            // ✅ NEW

  companySize.value=p.companySize||"";    // ✅ NEW
  companyType.value=p.companyType||"";    // ✅ NEW

  bio.value=p.bio||"";                    // ✅ NEW
  companyDesc.value=p.companyDesc||"";    // ✅ NEW

  const img = localStorage.getItem("recPhoto");
  if(img) preview.src = img;
}

/* LOGOUT */
function logout(){ localStorage.clear(); location.href="/html/index.html"; }

show("dashboard");
</script>

</body>
</html>
